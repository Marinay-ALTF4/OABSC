name: Supabase Restore

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Artifact name to restore (e.g. supabase-backup-1)'
        required: true

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get install -y gnupg curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16
          pg_restore --version

      - name: Download Backup Artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: '${{ github.event.inputs.artifact_name }}',
              per_page: 1
            });

            if (artifacts.data.total_count === 0) {
              core.setFailed('No artifact found with name: ${{ github.event.inputs.artifact_name }}');
              return;
            }

            const artifact = artifacts.data.artifacts[0];
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip'
            });

            const fs = require('fs');
            fs.writeFileSync('backup.zip', Buffer.from(download.data));

      - name: Extract Artifact
        run: unzip backup.zip

      - name: Restore Database
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          pg_restore \
            -h ${{ secrets.SUPABASE_HOST }} \
            -U ${{ secrets.SUPABASE_USER }} \
            -d ${{ secrets.SUPABASE_DB }} \
            -p ${{ secrets.SUPABASE_PORT }} \
            --no-owner \
            --no-acl \
            --clean \
            --if-exists \
            -F c \
            *.dump

      - name: Restore Complete
        run: echo "Database restored successfully!"